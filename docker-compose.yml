services:
  postgres:
    image: postgres:17-alpine
    container_name: maison-verde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shoppass
    ports:
      - "5432:5432"
    volumes:
      - shop-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional pgAdmin GUI. Run only when you want it:
  #   docker compose --profile tools up -d
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: maison-verde-pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@maisonverde.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  shop-pg-data:
